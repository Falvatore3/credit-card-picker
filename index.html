    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f18;
      --surface: #161929;
      --card-r: 28px;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --gold: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ══ INTRO ══ */
    #stage-intro {
      width: 100%; max-width: 480px;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px;
      text-align: center;
      gap: 20px;
    }
    .intro-emoji { font-size: 64px; }
    .intro-title { font-size: 28px; font-weight: 800; line-height: 1.2; }
    .intro-sub { font-size: 15px; color: var(--muted2); line-height: 1.7; }
    .intro-rules {
      background: var(--surface);
      border-radius: 20px;
      padding: 20px 24px;
      width: 100%;
      display: flex; flex-direction: column; gap: 14px;
    }
    .rule-row { display: flex; align-items: center; gap: 14px; text-align: left; }
    .rule-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .rule-row p { font-size: 14px; color: var(--muted2); line-height: 1.5; }
    .rule-row strong { color: var(--text); display: block; font-size: 15px; margin-bottom: 2px; }
    .start-btn {
      width: 100%; padding: 18px;
      border-radius: 99px; border: none;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; font-size: 17px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(99,102,241,.4);
      transition: transform .15s;
    }
    .start-btn:hover { transform: scale(1.03); }

    /* ══ SWIPE STAGE ══ */
    #stage-swipe {
      width: 100%; max-width: 480px;
      display: none; flex-direction: column;
      align-items: center;
      padding: 20px 24px 32px;
    }

    /* header */
    .sw-header {
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .sw-title { font-size: 16px; font-weight: 700; }
    .sw-count { font-size: 13px; color: var(--muted2); }

    /* progress */
    .prog-bar { width: 100%; height: 5px; background: #1e2235; border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border-radius: 99px; transition: width .4s ease; }

    /* hint */
    .sw-hint { display: flex; gap: 24px; margin-bottom: 18px; }
    .sw-hint span { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; }

    /* ── Card stack ── */
    .card-stack { position: relative; width: 100%; height: 400px; }

    .q-card-back {
      position: absolute; top: 0; left: 50%;
      border-radius: var(--card-r);
      pointer-events: none;
    }
    .q-card-back-1 {
      width: calc(100% - 32px);
      height: 370px;
      transform: translateX(-50%) translateY(18px) scale(.96);
      opacity: .35;
    }
    .q-card-back-2 {
      width: calc(100% - 56px);
      height: 370px;
      transform: translateX(-50%) translateY(34px) scale(.92);
      opacity: .18;
    }

    .q-card {
      position: absolute; top: 0; left: 50%;
      width: 100%; height: 370px;
      border-radius: var(--card-r);
      transform: translateX(-50%);
      cursor: grab;
      touch-action: none;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
      overflow: hidden;
      will-change: transform;
      display: flex; flex-direction: column;
    }
    .q-card:active { cursor: grabbing; }

    /* card top band */
    .qc-band {
      height: 8px;
      flex-shrink: 0;
    }

    /* card body */
    .qc-body {
      flex: 1;
      background: var(--surface);
      padding: 32px 28px 24px;
      display: flex; flex-direction: column; justify-content: space-between;
    }

    .qc-category {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; letter-spacing: .06em;
      padding: 5px 12px; border-radius: 99px;
      margin-bottom: 20px;
      align-self: flex-start;
    }

    .qc-emoji { font-size: 52px; margin-bottom: 16px; display: block; }
    .qc-question { font-size: 22px; font-weight: 800; line-height: 1.35; margin-bottom: 10px; }
    .qc-detail { font-size: 14px; color: var(--muted2); line-height: 1.6; }

    .qc-swipe-hint {
      display: flex; justify-content: space-between;
      margin-top: 20px;
    }
    .qc-swipe-hint span {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }

    /* overlays */
    .overlay-yes, .overlay-no {
      position: absolute;
      top: 28px;
      font-size: 22px; font-weight: 900;
      padding: 6px 18px;
      border-radius: 10px;
      border: 3px solid;
      opacity: 0;
      pointer-events: none;
      letter-spacing: .05em;
      z-index: 5;
    }
    .overlay-yes { left: 22px; color: var(--green); border-color: var(--green); transform: rotate(-12deg); }
    .overlay-no  { right: 22px; color: var(--red);   border-color: var(--red);   transform: rotate(12deg);  }

    /* action buttons */
    .action-row {
      display: flex; align-items: center; justify-content: center;
      gap: 28px; margin-top: 28px;
    }
    .btn-circ {
      border: none; cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    .btn-circ:hover { transform: scale(1.1); }
    .btn-circ:active { transform: scale(.93); }
    .btn-no   { width: 68px; height: 68px; background: #2a1f2a; color: var(--red);   font-size: 26px; }
    .btn-yes  { width: 68px; height: 68px; background: #1a2a1f; color: var(--green); font-size: 26px; }
    .btn-undo { width: 52px; height: 52px; background: #1e2030; color: var(--gold);  font-size: 20px; }

    /* labels */
    .label-row {
      display: flex; justify-content: space-between; width: 100%; margin-top: 10px;
      padding: 0 10px;
    }
    .label-no  { font-size: 12px; color: var(--red);   font-weight: 700; }
    .label-yes { font-size: 12px; color: var(--green); font-weight: 700; }

    /* ══ RESULT STAGE ══ */
    #stage-result {
      display: none; flex-direction: column;
      width: 100%; max-width: 480px;
      padding: 24px 24px 60px;
      gap: 16px;
    }
    .res-header { text-align: center; padding: 10px 0 4px; }
    .res-emoji { font-size: 48px; }
    .res-title { font-size: 24px; font-weight: 800; margin-top: 8px; }
    .res-sub { font-size: 14px; color: var(--muted2); margin-top: 6px; line-height: 1.6; }

    /* top pick */
    .top-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700;
      padding: 5px 14px; border-radius: 99px;
      background: linear-gradient(90deg, var(--gold), #f97316);
      color: #fff;
      margin-bottom: 4px;
    }

    .res-card {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,.45);
    }
    .res-card-top {
      padding: 24px 24px 18px;
      display: flex; align-items: center; gap: 16px;
    }
    .res-card-icon {
      width: 60px; height: 60px; border-radius: 16px;
      background: rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .res-card-info { flex: 1; }
    .res-card-bank { font-size: 11px; color: rgba(255,255,255,.7); font-weight: 700; letter-spacing: .08em; }
    .res-card-name { font-size: 18px; font-weight: 800; color: #fff; }
    .res-match-pill {
      font-size: 12px; font-weight: 700;
      padding: 5px 12px; border-radius: 99px;
      background: rgba(255,255,255,.18); color: #fff;
      white-space: nowrap;
    }
    .res-card-body {
      padding: 16px 24px 24px;
      background: rgba(0,0,0,.22);
    }
    .res-reason { font-size: 14px; color: rgba(255,255,255,.88); line-height: 1.7; margin-bottom: 14px; }
    .res-features { display: flex; flex-wrap: wrap; gap: 8px; }
    .res-feat {
      font-size: 12px; padding: 5px 12px;
      background: rgba(255,255,255,.12);
      border-radius: 8px; color: rgba(255,255,255,.9);
    }

    /* profile tags */
    .profile-box {
      background: var(--surface); border-radius: 20px;
      padding: 18px 20px;
    }
    .profile-box-title { font-size: 13px; color: var(--muted2); margin-bottom: 12px; }
    .profile-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .profile-tag {
      font-size: 13px; padding: 6px 16px;
      border-radius: 99px;
      background: rgba(99,102,241,.15);
      color: var(--blue); font-weight: 600;
    }

    /* other picks */
    .other-title { font-size: 13px; color: var(--muted2); font-weight: 600; margin-bottom: 8px; }
    .other-list { display: flex; flex-direction: column; gap: 10px; }
    .other-item {
      border-radius: 18px; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    .other-icon { font-size: 28px; }
    .other-bank { font-size: 11px; color: rgba(255,255,255,.65); }
    .other-name { font-size: 15px; font-weight: 700; color: #fff; }
    .other-annual { margin-left: auto; font-size: 12px; color: rgba(255,255,255,.7); }

    /* restart */
    .restart-btn {
      padding: 16px; border-radius: 99px; border: none;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; text-align: center;
      box-shadow: 0 8px 32px rgba(99,102,241,.35);
      transition: transform .15s;
    }
    .restart-btn:hover { transform: scale(1.03); }
  </style>
</head>

<!-- ══════════ SWIPE STAGE ══════════ -->
<div id="stage-swipe">

  <div class="label-row">

</div>

  {

    tagline: '高端财富管理客户专属',
    annual: '2000元/年', annualFee: 2000,
    gradient: ['#b8860b','#ffd700'], icon: '👑',

    weights: { premium:5, travel:2, airport:2, points:2 },

    annual: '刷6次免年费', annualFee: 200,
    gradient: ['#fd746c','#ff9068'], icon: '🎁',
    features: ['积分永久有效','积分兑换商城','生日积分翻倍','账单分期无手续费'],
    weights: { points:5, free_annual:2, cashback:1 },
  },
  {
    id: 'icbcuniverse', bank: '工商银行', name: '宇宙星座信用卡',
    tagline: '高颜值 · 十二星座主题',
    annual: '200元/年', annualFee: 200,
    gradient: ['#4facfe','#00f2fe'], icon: '⭐',
    features: ['星座主题设计','积分不过期','网红打卡赠礼','积分兑换里程'],
    weights: { entertainment:2, points:3, cashback:1 },
  },
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let cur = 0;
let answers = {};   // tag -> true/false
let history = [];

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function startQuiz() {
  document.getElementById('stage-intro').style.display = 'none';
  const sw = document.getElementById('stage-swipe');
  sw.style.display = 'flex';
  renderStack();
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function renderStack() {
  const stack = document.getElementById('card-stack');
  stack.innerHTML = '';
  updateProgress();

  if (cur >= QUESTIONS.length) { showResult(); return; }

  // back cards
  [2, 1].forEach(offset => {
    const idx = cur + offset;
    if (idx < QUESTIONS.length) {
      const q = QUESTIONS[idx];
      const back = document.createElement('div');
      back.className = `q-card-back q-card-back-${offset}`;
      back.style.background = q.color + '22';
      back.style.borderTop = `6px solid ${q.color}55`;
      stack.appendChild(back);
    }
  });

  // active card
  const q = QUESTIONS[cur];
  const el = document.createElement('div');
  el.className = 'q-card';
  el.dataset.idx = cur;

  el.innerHTML = `
    <div class="qc-band" style="background:${q.color}"></div>
    <div class="qc-body">
      <div>
        <span class="qc-category" style="background:${q.color}22;color:${q.color}">
          ${q.category}
        </span>
        <span class="qc-emoji">${q.emoji}</span>
        <div class="qc-question">${q.question}</div>
        <div class="qc-detail">${q.detail}</div>
      </div>
      <div class="qc-swipe-hint">
        <span style="color:${getComputedStyle(document.documentElement).getPropertyValue('--red')}">← 不符合</span>
        <span style="color:${getComputedStyle(document.documentElement).getPropertyValue('--green')}">符合我 →</span>
      </div>
    </div>
    <div class="overlay-yes">符合 ✓</div>
    <div class="overlay-no">跳过 ✕</div>
  `;

  stack.appendChild(el);
  bindDrag(el);
}

/* ═══════════════════════════════════════
   DRAG
═══════════════════════════════════════ */
function bindDrag(el) {
  let sx = 0, dx = 0, dragging = false;
  const yesEl = el.querySelector('.overlay-yes');
  const noEl  = el.querySelector('.overlay-no');

  function start(x) { sx = x; dragging = true; el.style.transition = 'none'; }
  function move(x) {
    if (!dragging) return;
    dx = x - sx;
    const rot = dx * 0.07;
    el.style.transform = `translateX(calc(-50% + ${dx}px)) rotate(${rot}deg)`;
    const r = Math.min(Math.abs(dx) / 70, 1);
    yesEl.style.opacity = dx > 0 ? r : 0;
    noEl.style.opacity  = dx < 0 ? r : 0;
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    yesEl.style.opacity = noEl.style.opacity = 0;
    el.style.transition = 'transform .3s ease, opacity .3s ease';
    if      (dx >  70) commitSwipe('yes');
    else if (dx < -70) commitSwipe('no');
    else el.style.transform = 'translateX(-50%) rotate(0deg)';
  }

  el.addEventListener('mousedown',  e => start(e.clientX));
  window.addEventListener('mousemove', e => { if (dragging) move(e.clientX); });
  window.addEventListener('mouseup',   () => end());
  el.addEventListener('touchstart', e => start(e.touches[0].clientX), { passive: true });
  el.addEventListener('touchmove',  e => move(e.touches[0].clientX),  { passive: true });
  el.addEventListener('touchend',   () => end());
}

/* ═══════════════════════════════════════
   SWIPE LOGIC
═══════════════════════════════════════ */
function commitSwipe(dir) {
  const q = QUESTIONS[cur];
  history.push({ idx: cur, dir, prevAnswer: answers[q.tag] });
  answers[q.tag] = (dir === 'yes');

  // fly out animation
  const el = document.querySelector('.q-card');
  if (el) {
    el.style.transition = 'transform .35s ease, opacity .35s ease';
    el.style.transform = dir === 'yes'
      ? 'translateX(150%) rotate(20deg)'
      : 'translateX(-150%) rotate(-20deg)';
    el.style.opacity = '0';
    setTimeout(() => { cur++; renderStack(); }, 350);
  }
}

function swipe(dir) {
  const el = document.querySelector('.q-card');
  if (!el) return;
  commitSwipe(dir);
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  answers[QUESTIONS[last.idx].tag] = last.prevAnswer;
  cur = last.idx;
  renderStack();
}

/* ═══════════════════════════════════════
   PROGRESS
═══════════════════════════════════════ */
function updateProgress() {
  const pct = Math.round((cur / QUESTIONS.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('sw-count').textContent = `${cur + 1} / ${QUESTIONS.length}`;
}

/* ═══════════════════════════════════════
   RESULT
═══════════════════════════════════════ */
function showResult() {
  document.getElementById('stage-swipe').style.display = 'none';
  const rs = document.getElementById('stage-result');
  rs.style.display = 'flex';

  // score each card
  const scored = CARDS.map(card => {
    let score = 0;
    Object.entries(card.weights || {}).forEach(([tag, w]) => {
      if (answers[tag] === true) score += w;
    });
    // penalty: user wants free annual but card is expensive
    if (answers['free_annual'] === true && card.annualFee > 500) score -= 3;
    if (answers['premium'] !== true && card.annualFee > 1000) score -= 2;
    return { card, score };
  }).sort((a, b) => b.score - a.score);

  const best = scored[0].card;
  const runners = scored.slice(1, 4).filter(s => s.score > 0).map(s => s.card);

  // profile tags from YES answers
  const TAG_LABELS = {
    dining:'爱吃美食', travel:'商旅出行', shopping:'网购达人',
    car:'驾车族', overseas:'爱出境游', entertainment:'娱乐生活',
    health:'运动健康', free_annual:'免年费优先', points:'积分控',
    airport:'机场贵宾', premium:'高端权益', cashback:'日常返现',
  };
  const profile = Object.entries(answers)
    .filter(([, v]) => v === true)
    .map(([k]) => TAG_LABELS[k])
    .filter(Boolean);

  // reason sentence
  const matchedTags = Object.keys(best.weights || {})
    .filter(t => answers[t] === true)
    .map(t => TAG_LABELS[t]).filter(Boolean);
  const reason = matchedTags.length
    ? `根据你的回答，你是一位「${profile.slice(0,2).join('·')}」用户。这张卡在${matchedTags.join('、')}方面与你高度匹配。`
    : '综合你的偏好分析，这张卡是整体权益最均衡的选择。';

  const gradStr = g => g.length >= 3
    ? `linear-gradient(135deg,${g[0]},${g[1]},${g[2]})`
    : `linear-gradient(135deg,${g[0]},${g[1]})`;

  rs.innerHTML = `
    <div class="res-header">
      <div class="res-emoji">🎉</div>
      <div class="res-title">为你找到了！</div>
      <div class="res-sub">基于你的 ${QUESTIONS.length} 个消费习惯问题<br>为你匹配出最合适的信用卡</div>
    </div>

    ${profile.length ? `
    <div class="profile-box">
      <div class="profile-box-title">📊 你的消费画像</div>
      <div class="profile-tags">
        ${profile.map(t => `<span class="profile-tag">${t}</span>`).join('')}
      </div>
    </div>` : ''}

    <div class="top-label">✦ 最佳匹配</div>

    <div class="res-card">
      <div class="res-card-top" style="background:${gradStr(best.gradient)}">
        <div class="res-card-icon">${best.icon}</div>
        <div class="res-card-info">
          <div class="res-card-bank">${best.bank.toUpperCase()}</div>
          <div class="res-card-name">${best.name}</div>
        </div>
        <div class="res-match-pill">推荐 #1</div>
      </div>
      <div class="res-card-body">
        <div class="res-reason">${reason}</div>
        <div class="res-features">
          ${best.features.map(f => `<span class="res-feat">✓ ${f}</span>`).join('')}
        </div>
        <div style="margin-top:14px;font-size:13px;color:rgba(255,255,255,.55)">年费：${best.annual}</div>
      </div>
    </div>

    ${runners.length ? `
    <div class="other-title">其他适合你的卡片</div>
    <div class="other-list">
      ${runners.map((c, i) => `
        <div class="other-item" style="background:${gradStr(c.gradient)}">
          <span class="other-icon">${c.icon}</span>
          <div>
            <div class="other-bank">${c.bank}</div>
            <div class="other-name">${c.name}</div>
          </div>
          <span class="other-annual">${c.annual}</span>
        </div>
      `).join('')}
    </div>` : ''}

    <button class="restart-btn" onclick="restart()">🔄 重新测一次</button>
  `;
}

/* ═══════════════════════════════════════
   RESTART
═══════════════════════════════════════ */
function restart() {
  cur = 0; answers = {}; history = [];
  document.getElementById('stage-result').style.display = 'none';
  document.getElementById('stage-result').innerHTML = '';
  const sw = document.getElementById('stage-swipe');
  sw.style.display = 'flex';
  renderStack();
}
</script>
