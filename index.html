  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card-radius: 24px;
      --green: #22c55e;
      --red: #ef4444;
      --gold: #f59e0b;
      --blue: #3b82f6;
      --purple: #a855f7;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ─── Header ─── */
    header {
      width: 100%;
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 480px;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    .progress-text { font-size: 0.8rem; color: var(--muted); }

    /* ─── Progress Bar ─── */
    .progress-wrap {
      width: 100%;
      max-width: 480px;
      padding: 12px 24px 0;
    }
    .progress-bar {
      height: 4px;
      background: #2d3148;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ─── Stage: Swipe ─── */
    #stage-swipe {
      width: 100%;
      max-width: 480px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 24px 30px;
    }
    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      gap: 20px;
    }
    .hint span { display: flex; align-items: center; gap: 4px; }

    /* ─── Card Stack ─── */
    .card-stack {
      position: relative;
      width: 100%;
      height: 380px;
      user-select: none;
    }
    .card-stack .bg-card {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%) scale(0.95) translateY(12px);
      width: calc(100% - 40px);
      height: 340px;
      border-radius: var(--card-radius);
      opacity: 0.4;
    }
    .card-stack .bg-card2 {
      transform: translateX(-50%) scale(0.9) translateY(24px);
      opacity: 0.2;
    }

    /* ─── The Swipeable Card ─── */
    .swipe-card {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 0px);
      height: 340px;
      border-radius: var(--card-radius);
      cursor: grab;
      transition: box-shadow 0.2s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      overflow: hidden;
      touch-action: none;
    }
    .swipe-card:active { cursor: grabbing; }
    .swipe-card.animate-left {
      animation: flyLeft 0.38s ease forwards;
    }
    .swipe-card.animate-right {
      animation: flyRight 0.38s ease forwards;
    }
    @keyframes flyLeft {
      to { transform: translateX(-150%) rotate(-20deg); opacity: 0; }
    }
    @keyframes flyRight {
      to { transform: translateX(150%) rotate(20deg); opacity: 0; }
    }

    /* ─── Card Inner ─── */
    .card-inner {
      width: 100%; height: 100%;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .card-bank { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; opacity: 0.85; }
    .card-name { font-size: 1.35rem; font-weight: 800; margin-top: 4px; line-height: 1.2; }
    .card-tagline { font-size: 0.8rem; opacity: 0.75; margin-top: 6px; }
    .chip { width: 40px; height: 30px; background: rgba(255,255,255,0.25); border-radius: 6px; margin-top: 16px; }
    .card-number { font-size: 0.95rem; letter-spacing: 0.2em; opacity: 0.7; margin-top: 8px; }

    .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 99px;
      background: rgba(255,255,255,0.18);
      font-weight: 600;
      backdrop-filter: blur(4px);
    }
    .card-annual { font-size: 0.72rem; text-align: right; opacity: 0.75; }
    .card-annual strong { display: block; font-size: 1.1rem; font-weight: 800; }

    /* ─── Swipe Overlays ─── */
    .like-overlay, .nope-overlay {
      position: absolute;
      top: 28px;
      font-size: 1.4rem;
      font-weight: 900;
      padding: 6px 16px;
      border-radius: 10px;
      border: 3px solid;
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
      letter-spacing: 0.05em;
    }
    .like-overlay { left: 24px; color: var(--green); border-color: var(--green); transform: rotate(-12deg); }
    .nope-overlay { right: 24px; color: var(--red); border-color: var(--red); transform: rotate(12deg); }

    /* ─── Action Buttons ─── */
    .action-btns {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 28px;
    }
    .btn-action {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.6rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }
    .btn-action:hover { transform: scale(1.1); }
    .btn-action:active { transform: scale(0.95); }
    .btn-nope  { background: #2a1f2a; color: var(--red); }
    .btn-like  { background: #1a2a1f; color: var(--green); }
    .btn-undo  { background: #1e2030; color: var(--gold); width: 50px; height: 50px; font-size: 1.2rem; }

    /* ─── Stage: Result ─── */
    #stage-result {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 20px 24px 40px;
      flex-direction: column;
      gap: 16px;
    }
    #stage-result h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
    #stage-result .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    .recommend-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gold), #f97316);
      color: #fff;
      margin-bottom: 12px;
    }

    .result-card {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .result-card .rc-top {
      padding: 20px 22px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .rc-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.15);
      font-size: 1.6rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .rc-info { flex: 1; }
    .rc-bank { font-size: 0.7rem; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 0.06em; }
    .rc-name { font-size: 1.05rem; font-weight: 800; }
    .match-score {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      background: rgba(255,255,255,0.15);
    }

    .result-card .rc-body {

      background: rgba(0,0,0,0.2);
    }
    .rc-reason { font-size: 0.82rem; color: rgba(255,255,255,0.85); line-height: 1.7; margin-bottom: 12px; }
    .rc-highlights { display: flex; gap: 8px; flex-wrap: wrap; }
    .highlight {
      font-size: 0.72rem;
      padding: 4px 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ─── Empty/Liked ─── */
    .all-done {
      text-align: center;
      padding: 40px 20px;
    }
    .all-done .emoji { font-size: 3rem; }
    .all-done p { color: var(--muted); margin-top: 12px; font-size: 0.9rem; }

      border: none;
      background: linear-gradient(135deg, var(--blue), var(--purple));

    .liked-section { margin-top: 8px; }

    .liked-list { display: flex; flex-direction: column; gap: 10px; }

    .no-likes { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
  </style>
</head>

/* ─────────────────────────────────────────
   Render card
───────────────────────────────────────── */
function buildCardEl(card, isBack = false) {
  const el = document.createElement('div');
  el.className = isBack ? 'swipe-card' : 'swipe-card';

  const g = card.gradient;
  el.style.background = g.length === 3
    ? `linear-gradient(135deg, ${g[0]}, ${g[1]}, ${g[2]})`
    : `linear-gradient(135deg, ${g[0]}, ${g[1]})`;

  el.innerHTML = `
    <div class="card-inner">
      <div>
        <div class="card-bank">${card.bank.toUpperCase()}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-tagline">${card.tagline}</div>
        <div class="chip"></div>
        <div class="card-number">•••• •••• •••• 8888</div>
      </div>
      <div class="card-bottom">
        <div class="card-tags">
          ${card.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="card-annual">
          年费<strong>${card.annual}</strong>
        </div>
      </div>
    </div>
    <div class="like-overlay">喜欢</div>
    <div class="nope-overlay">跳过</div>
  `;
  return el;
}

function renderStack() {
  const stack = document.getElementById('card-stack');
  stack.innerHTML = '';

  if (current >= CARDS.length) {
    showResult();
    return;
  }

  // Back cards (visual depth)
  for (let i = Math.min(current + 2, CARDS.length - 1); i > current; i--) {
    const back = buildCardEl(CARDS[i], true);
    back.style.transform = `translateX(-50%) scale(${0.9 + (i - current - 1) * 0.05}) translateY(${(i - current) * 12}px)`;
    back.style.position = 'absolute';
    back.style.top = '0';
    back.style.left = '50%';
    back.style.opacity = String(0.2 + (i - current - 1) * 0.2);
    back.style.pointerEvents = 'none';
    stack.appendChild(back);
  }

  // Active card
  const card = CARDS[current];
  const el = buildCardEl(card);
  el.dataset.cardId = card.id;
  stack.appendChild(el);

  bindSwipe(el);
  updateProgress();
}

───────────────────────────────────────── */
function bindSwipe(el) {
  let startX = 0, startY = 0, dx = 0;
  let dragging = false;

  const likeEl = el.querySelector('.like-overlay');
  const nopeEl = el.querySelector('.nope-overlay');

  function onStart(x, y) {
    startX = x; startY = y; dragging = true;
    el.style.transition = 'none';
  }
  function onMove(x) {
    if (!dragging) return;
    dx = x - startX;
    const rot = dx * 0.08;
    el.style.transform = `translateX(calc(-50% + ${dx}px)) rotate(${rot}deg)`;
    const ratio = Math.min(Math.abs(dx) / 80, 1);
    if (dx > 0) {
      likeEl.style.opacity = ratio;
      nopeEl.style.opacity = 0;
    } else {
      nopeEl.style.opacity = ratio;
      likeEl.style.opacity = 0;
    }
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    likeEl.style.opacity = 0;
    nopeEl.style.opacity = 0;
    el.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    if (dx > 80) {
      commitSwipe('right');
    } else if (dx < -80) {
      commitSwipe('left');
    } else {
      el.style.transform = 'translateX(-50%) rotate(0deg)';
    }
  }

  // Mouse
  el.addEventListener('mousedown', e => { onStart(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX); });
  window.addEventListener('mouseup', () => onEnd());

  // Touch
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    const t = e.touches[0];
    onMove(t.clientX);
  }, { passive: true });
  el.addEventListener('touchend', () => onEnd());
}

/* ─────────────────────────────────────────
   Swipe logic
───────────────────────────────────────── */
function commitSwipe(dir) {
  const card = CARDS[current];
  history.push({ idx: current, dir });

  if (dir === 'right') {
    liked.push(card);
    card.score_keys.forEach(k => { if (scores[k] !== undefined) scores[k] += 1; });
  }

  const el = document.querySelector('.swipe-card[data-card-id]');
  if (el) {
    el.classList.add(dir === 'right' ? 'animate-right' : 'animate-left');
    setTimeout(() => { current++; renderStack(); }, 380);
  }
}

function swipeCard(dir) {
  const el = document.querySelector('.swipe-card[data-card-id]');
  if (!el) return;
  commitSwipe(dir);
}

function undoSwipe() {
  if (history.length === 0) return;
  const last = history.pop();
  if (last.dir === 'right') {
    const idx = liked.findIndex(c => c.id === CARDS[last.idx].id);
    if (idx !== -1) {
      liked.splice(idx, 1);
      CARDS[last.idx].score_keys.forEach(k => { if (scores[k] > 0) scores[k] -= 1; });
    }
  }
  current = last.idx;
  renderStack();
}

/* ─────────────────────────────────────────
   Progress
───────────────────────────────────────── */
function updateProgress() {
  const pct = Math.round((current / CARDS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${current} / ${CARDS.length}`;
}

/* ─────────────────────────────────────────
   Result Page
───────────────────────────────────────── */
function showResult() {
  document.getElementById('stage-swipe').style.display = 'none';
  const rs = document.getElementById('stage-result');
  rs.style.display = 'flex';

  // Find top dimension
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topDims = sorted.slice(0, 3).filter(d => d[1] > 0).map(d => d[0]);

  // Score each liked card
  let bestCard = null;
  let bestScore = -1;

  // If no likes, recommend from all
  const pool = liked.length > 0 ? liked : CARDS;
  pool.forEach(card => {
    let s = 0;
    topDims.forEach(dim => {
      if (card.score_keys.includes(dim)) s += 2;
    });
    if (s > bestScore) { bestScore = s; bestCard = card; }
  });

  if (!bestCard) bestCard = CARDS[0];

  const container = document.getElementById('result-content');

  // Generate reason
  const matchedLabels = bestCard.score_keys
    .filter(k => topDims.includes(k))
    .map(k => SCORE_LABELS[k]);
  const reasonText = matchedLabels.length > 0
    ? `根据你的偏好（${topDims.map(d => SCORE_LABELS[d]).join('、')}），这张卡在${matchedLabels.join('、')}方面与你最匹配。`
    : `综合你的滑动行为分析，这张卡整体权益最贴近你的需求。`;

  const g = bestCard.gradient;
  const gradStr = g.length === 3
    ? `linear-gradient(135deg, ${g[0]}, ${g[1]}, ${g[2]})`
    : `linear-gradient(135deg, ${g[0]}, ${g[1]})`;

  // Other liked cards
  const otherLiked = liked.filter(c => c.id !== bestCard.id);

  container.innerHTML = `
    <h2>🎯 为你推荐</h2>
    <p class="sub">基于你的 ${CARDS.length} 张卡片选择行为，智能分析完成</p>

    <span class="recommend-badge">✦ 最佳匹配</span>

    <div class="result-card" style="background:${gradStr}">
      <div class="rc-top">
        <div class="rc-icon">${bestCard.icon}</div>
        <div class="rc-info">
          <div class="rc-bank">${bestCard.bank}</div>
          <div class="rc-name">${bestCard.name}</div>
        </div>
        <div class="match-score">${liked.includes(bestCard) ? '💚 已喜欢' : '🤖 AI推荐'}</div>
      </div>
      <div class="rc-body">
        <div class="rc-reason">${reasonText}</div>
        <div class="rc-highlights">
          ${bestCard.features.map(f => `<div class="highlight">✓ ${f}</div>`).join('')}
        </div>
      </div>
    </div>

    ${topDims.length > 0 ? `
    <div style="margin-top:4px; padding: 14px 18px; background:var(--surface); border-radius:16px;">
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:10px;">📊 你的消费偏好分析</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${topDims.map(d => `
          <div style="padding:6px 14px;background:rgba(99,102,241,0.15);border-radius:99px;font-size:0.78rem;font-weight:600;color:var(--blue);">
            ${SCORE_LABELS[d]} ${Array(scores[d]+1).join('★')}
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    ${otherLiked.length > 0 ? `
    <div class="liked-section">
      <h3>你也喜欢的卡片 (${otherLiked.length})</h3>
      <div class="liked-list">
        ${otherLiked.map(c => {
          const cg = c.gradient;
          const cgs = cg.length === 3
            ? `linear-gradient(135deg, ${cg[0]}, ${cg[1]}, ${cg[2]})`
            : `linear-gradient(135deg, ${cg[0]}, ${cg[1]})`;
          return `
          <div class="liked-item" style="background:${cgs}">
            <div class="li-icon">${c.icon}</div>
            <div>
              <div class="li-bank">${c.bank}</div>
              <div class="li-name">${c.name}</div>
            </div>
            <div style="margin-left:auto;font-size:0.72rem;opacity:0.8">${c.annual}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    ${liked.length === 0 ? `
    <div class="no-likes">你没有右滑任何卡片，以下是基于 AI 分析的推荐。</div>
    ` : ''}

    <button class="restart-btn" onclick="restart()">🔄 重新测一次</button>
  `;
}

/* ─────────────────────────────────────────
   Restart
───────────────────────────────────────── */
function restart() {
  current = 0;
  liked = [];
  history = [];
  Object.keys(scores).forEach(k => scores[k] = 0);
  document.getElementById('stage-result').style.display = 'none';
  document.getElementById('stage-swipe').style.display = 'flex';
  renderStack();
}

/* ─────────────────────────────────────────
   Init
───────────────────────────────────────── */
renderStack();
</script>
</body>
</html>
