<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>信用卡推荐 · 2025</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f18;--sur:#161929;--sur2:#1e2236;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--gold:#f59e0b;--cyan:#06b6d4;
  --text:#f1f5f9;--muted:#64748b;--muted2:#94a3b8;
  --r:24px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* ── INTRO ── */
#s-intro{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;gap:22px;text-align:center}
.i-big{font-size:60px}
.i-title{font-size:26px;font-weight:800;line-height:1.25}
.i-sub{font-size:14px;color:var(--muted2);line-height:1.7}
.i-tips{width:100%;background:var(--sur);border-radius:20px;padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.i-row{display:flex;align-items:center;gap:14px;text-align:left}
.i-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.i-row p{font-size:13px;color:var(--muted2);line-height:1.5}
.i-row strong{color:var(--text);display:block;font-size:14px;margin-bottom:1px}
.btn-start{width:100%;padding:17px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(99,102,241,.4);transition:transform .15s}
.btn-start:hover{transform:scale(1.03)}

/* ── QUIZ STAGE ── */
#s-quiz{width:100%;max-width:480px;display:none;flex-direction:column;align-items:center;padding:18px 22px 40px}
.q-header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.q-title{font-size:15px;font-weight:700}
.q-counter{font-size:12px;color:var(--muted2)}
.prog{width:100%;height:4px;background:#1e2235;border-radius:99px;overflow:hidden;margin-bottom:22px}
.prog-f{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;transition:width .4s}

/* swipe hint */
.sw-hint{display:flex;gap:20px;margin-bottom:16px}
.sw-hint span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}

/* ── Card stack ── */
.stack{position:relative;width:100%;height:420px}
.back-card{position:absolute;top:0;left:50%;border-radius:var(--r);pointer-events:none;background:var(--sur2)}
.back1{width:calc(100% - 28px);height:390px;transform:translateX(-50%) translateY(18px) scale(.96);opacity:.35}
.back2{width:calc(100% - 52px);height:390px;transform:translateX(-50%) translateY(34px) scale(.92);opacity:.18}

.q-card{position:absolute;top:0;left:50%;width:100%;border-radius:var(--r);transform:translateX(-50%);cursor:grab;touch-action:none;box-shadow:0 20px 60px rgba(0,0,0,.55);overflow:hidden;will-change:transform;display:flex;flex-direction:column;background:var(--sur)}
.q-card:active{cursor:grabbing}
.qc-band{height:7px;flex-shrink:0}
.qc-body{flex:1;padding:26px 26px 22px;display:flex;flex-direction:column;gap:0}
.qc-cat{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:99px;margin-bottom:18px;align-self:flex-start}
.qc-em{font-size:46px;display:block;margin-bottom:14px}
.qc-q{font-size:20px;font-weight:800;line-height:1.35;margin-bottom:8px}
.qc-detail{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:18px}

/* ── Question types ── */

/* SWIPE type: hint at bottom */
.qc-swipe-foot{display:flex;justify-content:space-between;margin-top:auto}
.qc-swipe-foot span{font-size:12px;color:var(--muted)}

/* CHOICE type */
.qc-choices{display:flex;flex-direction:column;gap:9px;margin-top:auto}
.choice-btn{padding:12px 16px;border-radius:14px;border:1.5px solid var(--sur2);background:var(--sur2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;display:flex;align-items:center;gap:10px}
.choice-btn:hover{background:#252840;border-color:#3a3f60}
.choice-btn.selected{border-color:var(--blue);background:rgba(59,130,246,.12);color:var(--blue)}
.choice-btn .cb-ico{font-size:18px;flex-shrink:0}

/* MULTI type */
.qc-multi{display:flex;flex-wrap:wrap;gap:9px;margin-top:auto}
.multi-btn{padding:9px 15px;border-radius:99px;border:1.5px solid var(--sur2);background:var(--sur2);color:var(--muted2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.multi-btn:hover{border-color:#3a3f60;color:var(--text)}
.multi-btn.selected{border-color:var(--blue);background:rgba(59,130,246,.15);color:var(--blue)}
.multi-next{margin-top:14px;width:100%;padding:12px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* SLIDER type */
.qc-slider-wrap{margin-top:auto}
.slider-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted2);margin-bottom:8px}
.slider-val{text-align:center;font-size:22px;font-weight:800;color:var(--blue);margin-bottom:12px}
input[type=range]{width:100%;accent-color:var(--blue);height:6px}
.slider-next{margin-top:14px;width:100%;padding:12px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* overlays */
.ov-yes,.ov-no{position:absolute;top:26px;font-size:20px;font-weight:900;padding:5px 16px;border-radius:9px;border:3px solid;opacity:0;pointer-events:none;letter-spacing:.04em;z-index:5}
.ov-yes{left:20px;color:var(--green);border-color:var(--green);transform:rotate(-12deg)}
.ov-no{right:20px;color:var(--red);border-color:var(--red);transform:rotate(12deg)}

/* action row */
.act-row{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:24px}
.btn-c{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;box-shadow:0 6px 18px rgba(0,0,0,.35);font-size:22px}
.btn-c:hover{transform:scale(1.1)}
.btn-c:active{transform:scale(.93)}
.btn-no {width:64px;height:64px;background:#2a1f2a;color:var(--red)}
.btn-ok {width:64px;height:64px;background:#1a2a1f;color:var(--green)}
.btn-ud {width:50px;height:50px;background:#1e2030;color:var(--gold);font-size:18px}
.act-labels{display:flex;justify-content:space-between;width:100%;padding:0 8px;margin-top:8px}
.act-labels span{font-size:11px;font-weight:700}

/* ── RESULT ── */
#s-result{display:none;flex-direction:column;width:100%;max-width:480px;padding:22px 22px 60px;gap:14px}
.res-top{text-align:center;padding:8px 0 4px}
.res-big{font-size:46px}
.res-title{font-size:22px;font-weight:800;margin-top:6px}
.res-sub{font-size:13px;color:var(--muted2);margin-top:5px;line-height:1.6}

.profile-box{background:var(--sur);border-radius:18px;padding:16px 18px}
.pb-title{font-size:12px;color:var(--muted2);margin-bottom:10px}
.pb-tags{display:flex;flex-wrap:wrap;gap:7px}
.pb-tag{font-size:12px;padding:5px 13px;border-radius:99px;background:rgba(59,130,246,.12);color:var(--blue);font-weight:600}

.top-label{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 13px;border-radius:99px;background:linear-gradient(90deg,var(--gold),#f97316);color:#fff}

.r-card{border-radius:22px;overflow:hidden;box-shadow:0 14px 44px rgba(0,0,0,.45)}
.r-top{padding:22px 22px 16px;display:flex;align-items:center;gap:14px}
.r-ico{width:56px;height:56px;border-radius:15px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.r-info{flex:1}
.r-bank{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;letter-spacing:.08em}
.r-name{font-size:17px;font-weight:800;color:#fff}
.r-pill{font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;background:rgba(255,255,255,.18);color:#fff;white-space:nowrap}
.r-body{padding:14px 22px 22px;background:rgba(0,0,0,.22)}
.r-reason{font-size:13px;color:rgba(255,255,255,.88);line-height:1.7;margin-bottom:12px}
.r-feats{display:flex;flex-wrap:wrap;gap:7px}
.r-feat{font-size:11px;padding:4px 11px;background:rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.9)}
.r-annual{margin-top:12px;font-size:12px;color:rgba(255,255,255,.5)}

.sec-title{font-size:12px;color:var(--muted2);font-weight:600;margin-bottom:8px}
.other-list{display:flex;flex-direction:column;gap:9px}
.other-item{border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.o-ico{font-size:26px}
.o-bank{font-size:10px;color:rgba(255,255,255,.6)}
.o-name{font-size:14px;font-weight:700;color:#fff}
.o-annual{margin-left:auto;font-size:11px;color:rgba(255,255,255,.65)}

.btn-restart{padding:15px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;box-shadow:0 8px 28px rgba(99,102,241,.35);transition:transform .15s}
.btn-restart:hover{transform:scale(1.03)}

/* ── Swipe-only action: hide buttons for non-swipe questions ── */
.hide{display:none!important}
</style>
</head>

/* ═══════════════════════════
   STATE
═══════════════════════════ */
let cur = 0;
let profile = {};   // tag -> value
let history = [];
let multiSel = [];

/* ═══════════════════════════
   ENTRY
═══════════════════════════ */
function startQuiz(){
  document.getElementById('s-intro').style.display='none';
  document.getElementById('s-quiz').style.display='flex';
  render();
}

/* ═══════════════════════════
   RENDER CURRENT QUESTION
═══════════════════════════ */
function render(){
  updateProgress();
  const q = QS[cur];
  const stack = document.getElementById('stack');
  const actRow = document.getElementById('act-row');
  const actLab = document.getElementById('act-labels');
  const swHint = document.getElementById('sw-hint');

  stack.innerHTML='';

  if(cur>=QS.length){ showResult(); return; }

  // back cards
  [2,1].forEach(o=>{
    if(cur+o<QS.length){
      const b=document.createElement('div');
      b.className=`back-card back${o}`;
      b.style.background=QS[cur+o].catColor+'22';
      stack.appendChild(b);
    }
  });

  const card = document.createElement('div');
  card.className='q-card';

  // dynamic height based on type
  const heights={swipe:370,choice:420,multi:430,slider:360};
  card.style.height=(heights[q.type]||380)+'px';

  let bodyHTML='';

  if(q.type==='swipe'){
    bodyHTML=`
      <div class="qc-swipe-foot">
        <span style="color:#ef4444">← 不符合我</span>
        <span style="color:#22c55e">符合我 →</span>
      </div>`;
    actRow.classList.remove('hide');
    actLab.classList.remove('hide');
    swHint.classList.remove('hide');
  } else {
    actRow.classList.add('hide');
    actLab.classList.add('hide');
    swHint.classList.add('hide');
  }

  if(q.type==='choice'){
    bodyHTML=`<div class="qc-choices" id="choices-wrap">
      ${q.choices.map((c,i)=>`
        <button class="choice-btn" onclick="selectChoice(${i},'${c.tag}')">
          <span class="cb-ico">${c.ico}</span>
          <div><div style="font-size:14px;font-weight:700">${c.label}</div>
          <div style="font-size:11px;color:var(--muted2);margin-top:1px">${c.desc}</div></div>
        </button>`).join('')}
    </div>`;
  }

  if(q.type==='multi'){
    multiSel=[];
    bodyHTML=`<div class="qc-multi" id="multi-wrap">
      ${q.choices.map((c,i)=>`
        <button class="multi-btn" id="mb-${i}" onclick="toggleMulti(${i},'${c.tag}')">
          ${c.ico} ${c.label}
        </button>`).join('')}
    </div>
    <button class="multi-next" onclick="nextMulti()">确认，下一题 →</button>`;
  }

  if(q.type==='slider'){
    const v=profile[q.tag+'_val']||q.defaultVal;
    bodyHTML=`<div class="qc-slider-wrap">
      <div class="slider-val" id="sliderVal">${q.formatVal(v)}</div>
      <div class="slider-labels">
        ${q.labels.map(l=>`<span>${l}</span>`).join('')}
      </div>
      <input type="range" id="sliderInput"
        min="${q.min}" max="${q.max}" step="${q.step}" value="${v}"
        oninput="updateSlider(this.value)">
      <button class="slider-next" onclick="nextSlider()">确认，下一题 →</button>
    </div>`;
  }

  card.innerHTML=`
    <div class="qc-band" style="background:${q.catColor}"></div>
    <div class="qc-body">
      <div>
        <span class="qc-cat" style="background:${q.catColor}22;color:${q.catColor}">${q.cat}</span>
        <span class="qc-em">${q.emoji}</span>
        <div class="qc-q">${q.q}</div>
        <div class="qc-detail">${q.detail}</div>
      </div>
      ${bodyHTML}
    </div>
    ${q.type==='swipe'?'<div class="ov-yes">符合 ✓</div><div class="ov-no">不符合 ✕</div>':''}
  `;

  stack.appendChild(card);
  if(q.type==='swipe') bindDrag(card);
}

/* ═══════════════════════════
   CHOICE HANDLER
═══════════════════════════ */
function selectChoice(idx, tag){
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.classList.toggle('selected', i===idx);
  });
  const q=QS[cur];
  // store
  profile[q.id+'_choice']=tag;
  // map to scoring tags
  const map={
    cashback:{cashback:3}, travel:{travel:3,airport:2}, shopping:{shopping:3}, premium:{premium:3},
    no_travel:{}, light_travel:{travel:1}, mid_travel:{travel:3}, heavy_travel:{travel:5,airport:4},
    ali_shop:{shopping:4}, jd_shop:{shopping:4}, offline_shop:{cashback:3,shopping:2}, all_shop:{shopping:2,cashback:2},
    young:{free_annual:3,lifestyle:2}, worker:{dining:2,cashback:2}, biz:{travel:3,airport:3,premium:2}, family:{cashback:3,health:2},
  };
  const w=map[tag]||{};
  Object.entries(w).forEach(([k,v])=>{ profile[k]=(profile[k]||0)+v; });

  setTimeout(()=>advance(), 300);
}

/* ═══════════════════════════
   MULTI HANDLER
═══════════════════════════ */
function toggleMulti(idx,tag){
  const btn=document.getElementById('mb-'+idx);
  const already=multiSel.findIndex(x=>x.idx===idx);
  if(already>=0){
    multiSel.splice(already,1);
    btn.classList.remove('selected');
  } else {
    multiSel.push({idx,tag});
    btn.classList.add('selected');
  }
}
function nextMulti(){
  multiSel.forEach(({tag})=>{ profile[tag]=(profile[tag]||0)+3; });
  advance();
}

/* ═══════════════════════════
   SLIDER HANDLER
═══════════════════════════ */
function updateSlider(v){
  const q=QS[cur];
  document.getElementById('sliderVal').textContent=q.formatVal(+v);
}
function nextSlider(){
  const v=+document.getElementById('sliderInput').value;
  const q=QS[cur];
  profile[q.tag+'_val']=v;
  if(v===0) profile['free_annual']=(profile['free_annual']||0)+5;
  else if(v<=300) profile['free_annual']=(profile['free_annual']||0)+3;
  advance();
}

/* ═══════════════════════════
   SWIPE HANDLER
═══════════════════════════ */
function bindDrag(el){
  let sx=0,dx=0,dr=false;
  const yEl=el.querySelector('.ov-yes'), nEl=el.querySelector('.ov-no');
  function s(x){sx=x;dr=true;el.style.transition='none'}
  function m(x){
    if(!dr)return; dx=x-sx;
    el.style.transform=`translateX(calc(-50% + ${dx}px)) rotate(${dx*.07}deg)`;
    const r=Math.min(Math.abs(dx)/70,1);
    yEl.style.opacity=dx>0?r:0; nEl.style.opacity=dx<0?r:0;
  }
  function e(){
    if(!dr)return; dr=false;
    yEl.style.opacity=nEl.style.opacity=0;
    el.style.transition='transform .32s ease,opacity .32s ease';
    if(dx>70) commitSwipe('yes',el);
    else if(dx<-70) commitSwipe('no',el);
    else el.style.transform='translateX(-50%) rotate(0)';
  }
  el.addEventListener('mousedown',ev=>s(ev.clientX));
  window.addEventListener('mousemove',ev=>{if(dr)m(ev.clientX)});
  window.addEventListener('mouseup',()=>e());
  el.addEventListener('touchstart',ev=>s(ev.touches[0].clientX),{passive:true});
  el.addEventListener('touchmove',ev=>m(ev.touches[0].clientX),{passive:true});
  el.addEventListener('touchend',()=>e());
}

function commitSwipe(dir,el){
  const q=QS[cur];
  history.push({idx:cur,snap:{...profile}});
  if(dir==='yes') profile[q.tag]=(profile[q.tag]||0)+4;
  flyOut(el,dir);
}

function flyOut(el,dir){
  el.style.transform=dir==='yes'
    ?'translateX(150%) rotate(20deg)'
    :'translateX(-150%) rotate(-20deg)';
  el.style.opacity='0';
  setTimeout(()=>advance(),330);
}

function swipe(dir){
  const el=document.querySelector('.q-card');
  if(!el||QS[cur].type!=='swipe')return;
  commitSwipe(dir,el);
}

/* ═══════════════════════════
   ADVANCE / UNDO
═══════════════════════════ */
function advance(){
  cur++;
  render();
}

function undo(){
  if(history.length===0||cur===0)return;
  const last=history.pop();
  cur=last.idx;
  Object.assign(profile,last.snap);
  // restore profile to snapshot
  Object.keys(profile).forEach(k=>delete profile[k]);
  Object.assign(profile,last.snap);
  render();
}

function updateProgress(){
  const pct=Math.round((cur/QS.length)*100);
  document.getElementById('prog-f').style.width=pct+'%';
  document.getElementById('q-counter').textContent=`${Math.min(cur+1,QS.length)} / ${QS.length}`;
}

/* ═══════════════════════════
   SCORING & RESULT
═══════════════════════════ */
function showResult(){
  document.getElementById('s-quiz').style.display='none';
  const rs=document.getElementById('s-result');
  rs.style.display='flex';

  const maxFee = profile['annualFee_val'] ?? 3600;

  const scored = CARDS.map(card=>{
    let s=0;
    // filter by annual fee
    if(card.annualFee > maxFee) return {card, score:-99};
    Object.entries(card.w||{}).forEach(([tag,w])=>{
      s += (profile[tag]||0)*w;
    });
    return {card,score:s};
  }).filter(x=>x.score>-99).sort((a,b)=>b.score-a.score);

  const best=scored[0]?.card||CARDS[0];
  const runners=scored.slice(1,5).filter(x=>x.score>0).map(x=>x.card);

  // profile tags
  const TAG_LABEL={
    cashback:'日常返现控', travel:'商旅达人', shopping:'购物党',
    premium:'高端玩家', dining:'吃货', car:'有车一族',
    overseas:'出境游爱好者', entertainment:'娱乐达人', health:'运动健身党',
    points:'积分收集控', free_annual:'免年费优先', airport:'贵宾厅常客',
  };
  const ptags=Object.entries(profile)
    .filter(([k,v])=>TAG_LABEL[k]&&v>=3)
    .sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([k])=>TAG_LABEL[k]);

  const matchTags=Object.keys(best.w||{}).filter(t=>profile[t]>=2).map(t=>TAG_LABEL[t]).filter(Boolean);
  const reason = matchTags.length
    ? `根据你的回答，你是${ptags.slice(0,2).map(t=>`「${t}」`).join('')}用户。这张卡在${matchTags.join('、')}方面与你高度匹配。`
    : '综合你的消费画像，这张卡整体权益最均衡，适合你的日常使用。';

  const g=c=>c.gradient.length>=3
    ?`linear-gradient(135deg,${c.gradient[0]},${c.gradient[1]},${c.gradient[2]})`
    :`linear-gradient(135deg,${c.gradient[0]},${c.gradient[1]})`;

  rs.innerHTML=`
    <div class="res-top">
      <div class="res-big">🎉</div>
      <div class="res-title">为你找到了！</div>
      <div class="res-sub">从 ${CARDS.length} 张 2025 热门信用卡中<br>为你精准匹配</div>
    </div>

    ${ptags.length?`
    <div class="profile-box">
      <div class="pb-title">📊 你的消费画像</div>
      <div class="pb-tags">${ptags.map(t=>`<span class="pb-tag">${t}</span>`).join('')}</div>
    </div>`:''}

    <div class="top-label">✦ 最佳匹配</div>

    <div class="r-card">
      <div class="r-top" style="background:${g(best)}">
        <div class="r-ico">${best.icon}</div>
        <div class="r-info">
          <div class="r-bank">${best.bank.toUpperCase()}</div>
          <div class="r-name">${best.name}</div>
        </div>
        <div class="r-pill">推荐 #1</div>
      </div>
      <div class="r-body">
        <div class="r-reason">${reason}</div>
        <div class="r-feats">${best.features.map(f=>`<span class="r-feat">✓ ${f}</span>`).join('')}</div>
        <div class="r-annual">年费：${best.annual}</div>
      </div>
    </div>

    ${runners.length?`
    <div class="sec-title">其他适合你的卡片（${runners.length}张）</div>
    <div class="other-list">
      ${runners.map(c=>`
        <div class="other-item" style="background:${g(c)}">
          <span class="o-ico">${c.icon}</span>
          <div><div class="o-bank">${c.bank}</div><div class="o-name">${c.name}</div></div>
          <span class="o-annual">${c.annual}</span>
        </div>`).join('')}
    </div>`:''}

    <button class="btn-restart" onclick="restart()">🔄 重新测一次</button>
  `;
}

/* ═══════════════════════════
   RESTART
═══════════════════════════ */
function restart(){
  cur=0; profile={}; history=[]; multiSel=[];
  document.getElementById('s-result').style.display='none';
  document.getElementById('s-result').innerHTML='';
  document.getElementById('act-row').classList.remove('hide');
  document.getElementById('act-labels').classList.remove('hide');
  document.getElementById('s-quiz').style.display='flex';
  render();
}
</script>
</body>
</html>
